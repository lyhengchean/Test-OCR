<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ឧបករណ៍ស្កេនអក្សរខ្មែរ - Khmer OCR</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, -apple-system, 'Noto Sans Khmer', sans-serif; }
    video, canvas, img { max-width: 100%; border-radius: 12px; }
    #status { font-size: 0.95rem; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen pb-8">
  <div class="max-w-2xl mx-auto p-4">
    <h1 class="text-3xl font-bold text-center text-indigo-700 mb-1">ឧបករណ៍ស្កេនអក្សរខ្មែរ</h1>
    <p class="text-center text-gray-600 mb-6">Pure Front-end • Temporary RAM only</p>

    <!-- Camera Section -->
    <div class="bg-white rounded-3xl shadow p-5 mb-6">
      <button id="startBtn" 
              class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-4 rounded-2xl text-lg active:scale-95 transition">
        📷 បើកកាមេរ៉ា (Open Camera)
      </button>

      <div id="cameraContainer" class="hidden mt-5">
        <div class="relative bg-black rounded-2xl overflow-hidden">
          <video id="video" autoplay playsinline class="w-full"></video>
        </div>
        <div class="flex gap-3 mt-5">
          <button id="captureBtn" 
                  class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-4 rounded-2xl text-lg active:scale-95 transition">
            📸 ថតនិងស្កេន (Capture & Scan)
          </button>
          <button id="stopBtn" 
                  class="flex-1 bg-gray-600 hover:bg-gray-700 text-white font-semibold py-4 rounded-2xl text-lg active:scale-95 transition">
            បិទ (Stop Camera)
          </button>
        </div>
      </div>
    </div>

    <!-- Result Section -->
    <div id="resultSection" class="hidden bg-white rounded-3xl shadow p-6">
      <div class="grid grid-cols-2 gap-4 mb-6">
        <div>
          <p class="text-xs uppercase tracking-widest text-gray-500 mb-1">Original</p>
          <img id="originalImg" class="w-full rounded-xl border border-gray-200">
        </div>
        <div>
          <p class="text-xs uppercase tracking-widest text-gray-500 mb-1">Processed</p>
          <img id="processedImg" class="w-full rounded-xl border border-gray-200">
        </div>
      </div>

      <div class="mb-5">
        <label class="block text-sm font-medium text-gray-700 mb-2">Preprocessing Mode:</label>
        <select id="preprocessMode" class="w-full border border-gray-300 rounded-2xl px-5 py-3 text-base focus:outline-none focus:ring-2 focus:ring-indigo-500">
          <option value="normal">Normal</option>
          <option value="highcontrast" selected>High Contrast (Recommended for Khmer)</option>
          <option value="clean">Clean Background</option>
        </select>
      </div>

      <div id="loading" class="hidden py-10 text-center">
        <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-indigo-600 border-t-transparent"></div>
        <p id="status" class="mt-4 text-indigo-700 font-medium">កំពុងទាញយកម៉ូដែល និងស្កេនអក្សរ... (Loading model & scanning)</p>
      </div>

      <div id="resultBox" class="hidden">
        <p class="text-sm text-gray-500 mb-2">អត្ថបទដែលបានស្គាល់ (Recognized Khmer Text)</p>
        <div id="recognizedText" 
             class="bg-gray-50 border border-gray-300 rounded-2xl p-6 text-xl leading-relaxed min-h-[140px] whitespace-pre-wrap break-words"></div>

        <div class="flex gap-3 mt-8">
          <button id="copyBtn"
                  class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-4 rounded-2xl text-lg active:scale-95 transition flex items-center justify-center gap-2">
            📋 ចម្លងអត្ថបទ (Copy)
          </button>
          <button id="clearBtn"
                  class="flex-1 bg-gray-500 hover:bg-gray-600 text-white font-semibold py-4 rounded-2xl text-lg active:scale-95 transition">
            លុបឡើងវិញ (Clear)
          </button>
        </div>
      </div>
    </div>

    <div class="text-center text-[10px] text-gray-500 mt-10">
      Khmer OCR • Tesseract.js v5.1.1 • Data stored only in browser RAM
    </div>
  </div>

  <script>
    // Elements
    const video = document.getElementById('video');
    const startBtn = document.getElementById('startBtn');
    const captureBtn = document.getElementById('captureBtn');
    const stopBtn = document.getElementById('stopBtn');
    const cameraContainer = document.getElementById('cameraContainer');
    const resultSection = document.getElementById('resultSection');
    const originalImg = document.getElementById('originalImg');
    const processedImg = document.getElementById('processedImg');
    const recognizedTextEl = document.getElementById('recognizedText');
    const loading = document.getElementById('loading');
    const statusText = document.getElementById('status');
    const resultBox = document.getElementById('resultBox');
    const preprocessMode = document.getElementById('preprocessMode');
    const copyBtn = document.getElementById('copyBtn');
    const clearBtn = document.getElementById('clearBtn');

    let stream = null;
    let worker = null;

    // Initialize Tesseract Worker (with better error handling)
    async function initTesseract() {
      if (worker) return worker;
      
      statusText.textContent = "កំពុងទាញយកម៉ូដែលខ្មែរ... (Downloading Khmer model - first time only)";
      loading.classList.remove('hidden');

      try {
        worker = await Tesseract.createWorker('khm', 1, {
          logger: (m) => {
            if (m.status === 'recognizing text') {
              statusText.textContent = `ស្កេន... ${Math.round(m.progress * 100)}%`;
            }
          }
        });
        return worker;
      } catch (err) {
        console.error("Worker init failed:", err);
        alert("មិនអាចចាប់ផ្តើម OCR បានទេ។ សូមព្យាយាម refresh ទំព័រ។\nFailed to start OCR engine. Try refreshing the page.");
        loading.classList.add('hidden');
        throw err;
      }
    }

    // Start Camera
    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 } }
        });
        video.srcObject = stream;
        await video.play();
        cameraContainer.classList.remove('hidden');
        startBtn.classList.add('hidden');
      } catch (err) {
        console.error(err);
        alert("មិនអាចបើកកាមេរ៉ាបានទេ។ សូមផ្តល់សិទ្ធិកាមេរ៉ា។");
      }
    }

    function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }
      cameraContainer.classList.add('hidden');
      startBtn.classList.remove('hidden');
    }

    // Preprocess image (optimized for Khmer)
    function preprocessImage(sourceImg) {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d', { willReadFrequently: true });

      // Upscale moderately for better OCR without killing performance
      canvas.width = sourceImg.width * 1.6;
      canvas.height = sourceImg.height * 1.6;

      ctx.drawImage(sourceImg, 0, 0, canvas.width, canvas.height);

      let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;
      const mode = preprocessMode.value;

      for (let i = 0; i < data.length; i += 4) {
        let gray = data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114;

        if (mode === 'highcontrast') {
          gray = (gray - 70) * 2.0;
        } else if (mode === 'clean') {
          gray = (gray - 50) * 1.6;
        } else {
          gray = (gray - 40) * 1.4;
        }

        gray = Math.max(0, Math.min(255, gray));
        data[i] = data[i + 1] = data[i + 2] = gray;
      }

      ctx.putImageData(imageData, 0, 0);

      const processed = new Image();
      processed.src = canvas.toDataURL('image/jpeg', 0.92); // jpeg slightly faster
      return { processed, canvas };
    }

    // Main Scan Function
    async function scanImage(capturedImg) {
      loading.classList.remove('hidden');
      resultBox.classList.add('hidden');

      try {
        const w = await initTesseract();

        const { processed, canvas } = preprocessImage(capturedImg);
        originalImg.src = capturedImg.src;
        processedImg.src = processed.src;

        statusText.textContent = "កំពុងស្កេនអក្សរខ្មែរ...";

        const result = await w.recognize(canvas, {
          tessedit_pageseg_mode: '6',
          tessedit_ocr_engine_mode: 3,
          preserve_interword_spaces: '1',
          tessedit_char_blacklist: '|[]{}()_~`',
        });

        const text = result.data.text.trim();

        recognizedTextEl.textContent = text || "មិនរកឃើញអត្ថបទទេ។ សាកល្បងម្តងទៀត។";
        resultBox.classList.remove('hidden');

      } catch (err) {
        console.error(err);
        recognizedTextEl.textContent = "មានបញ្ហាក្នុងការស្កេន។ សូមព្យាយាមម្តងទៀត។\nError scanning. Please try again.";
        resultBox.classList.remove('hidden');
      } finally {
        loading.classList.add('hidden');
      }
    }

    // Capture Button (Fixed)
    captureBtn.addEventListener('click', async () => {
      if (!video.videoWidth) {
        alert("កាមេរ៉ាមិនដំណើរការ។ សូមព្យាយាមម្តងទៀត។");
        return;
      }

      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);

      const capturedImg = new Image();
      capturedImg.src = canvas.toDataURL('image/jpeg', 0.95);
      
      capturedImg.onload = () => {
        scanImage(capturedImg);
      };
    });

    // Event Listeners
    startBtn.addEventListener('click', startCamera);
    stopBtn.addEventListener('click', stopCamera);

    copyBtn.addEventListener('click', () => {
      const text = recognizedTextEl.textContent.trim();
      if (text && !text.includes("មិនរកឃើញ")) {
        navigator.clipboard.writeText(text).then(() => {
          const original = copyBtn.innerHTML;
          copyBtn.innerHTML = '✅ បានចម្លង!';
          setTimeout(() => copyBtn.innerHTML = original, 1800);
        });
      }
    });

    clearBtn.addEventListener('click', () => {
      resultSection.classList.add('hidden');
      resultBox.classList.add('hidden');
      recognizedTextEl.textContent = '';
    });

    // Cleanup on page unload
    window.addEventListener('beforeunload', () => {
      if (worker) worker.terminate();
      if (stream) stream.getTracks().forEach(t => t.stop());
    });

    console.log('%cKhmer OCR Scanner - Fixed version ready', 'color:#4f46e5;font-weight:bold');
  </script>
</body>
</html>
